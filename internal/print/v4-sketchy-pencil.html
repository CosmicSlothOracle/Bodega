<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>V4: Sketchy Pencil Style</title>
  <style>
    /* STYLE 4: Sketchy Pencil Style */
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Nanum+Pen+Script&display=swap');

    :root {
      --bg: #f9f8f6; /* Sketchbook paper */
      --pencil: #3a3a3c; /* Graphite */
      --pencil-light: rgba(58, 58, 60, 0.5);
    }
    body {
      margin: 0; padding: 2rem;
      font-family: 'Caveat', 'Comic Sans MS', cursive;
      background: var(--bg); color: var(--pencil);
      background-image: 
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    .sheet {
      max-width: 900px; margin: 0 auto;
      padding: 2rem 3rem;
      border: 2px solid var(--pencil);
      border-radius: 4px 8px 3px 6px; /* Slightly irregular border */
      box-shadow: 4px 4px 0px var(--pencil-light);
      background: #ffffff;
      position: relative;
    }
    header {
      display: flex; justify-content: space-between; align-items: baseline;
      border-bottom: 2px dashed var(--pencil-light); padding-bottom: 1rem; margin-bottom: 2rem;
    }
    h1 { margin: 0; font-size: 4rem; font-weight: 700; transform: rotate(-1deg); }
    .price { font-size: 2rem; font-family: 'Nanum Pen Script', cursive; border: 1px solid var(--pencil); padding: 0.2rem 1rem; border-radius: 50%; transform: rotate(2deg); }
    h2 { font-size: 2rem; letter-spacing: 0.05em; margin-bottom: 1.5rem; text-decoration: underline; text-decoration-style: wavy; text-underline-offset: 4px; }
    
    .kit { display: flex; gap: 2.5rem; flex-wrap: wrap; }
    .item { display: flex; flex-direction: column; align-items: center; width: 90px; text-align: center; font-size: 1.5rem; line-height: 1.1; }
    
    .icon { width: 80px; height: 80px; margin-bottom: 0.5rem; }
    /* Sketchy SVG Styling - multiple overlapping strokes */
    .icon path, .icon circle, .icon rect { fill: none; stroke: var(--pencil); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .icon .rough { stroke-width: 0.8; stroke: var(--pencil-light); }
    
    .flow { display: flex; align-items: center; gap: 1rem; margin-top: 1rem; }
    .step { flex: 1; text-align: center; }
    .step strong { display: block; font-size: 1.8rem; margin-top: 0.5rem; }
    .step em { font-size: 1.4rem; color: #666; }
    .arrow { font-size: 3rem; color: var(--pencil); transform: translateY(-10px); }
  </style>
</head>
<body>
  <div class="sheet">
    <header>
      <h1>Bodega Spritz</h1>
      <div class="price">6,90 €</div>
    </header>

    <section>
      <h2>Was wir brauchen:</h2>
      <div class="kit">
        <!-- Weinglas Sketchy -->
        <div class="item">
          <svg class="icon" viewBox="0 0 64 64">
            <path d="M12 12 c0 0 0 32 20 32 c20 0 20 -32 20 -32 z" />
            <path d="M11 13 c0 0 0 33 21 33 c21 0 21 -33 21 -33 z" class="rough" />
            <path d="M13 11 c0 0 0 31 19 31 c19 0 19 -31 19 -31 z" class="rough" />
            <path d="M32 44 v16 M20 60 h24" />
            <path d="M31 44 v15 M21 59 h22" class="rough" />
          </svg>
          <span>Weinglas</span>
        </div>
        <!-- Eis Sketchy -->
        <div class="item">
          <svg class="icon" viewBox="0 0 64 64">
            <rect x="12" y="16" width="24" height="24" rx="2" transform="rotate(-5 24 28)" />
            <rect x="11" y="15" width="26" height="26" rx="2" class="rough" transform="rotate(-3 24 28)" />
            <rect x="28" y="28" width="24" height="24" rx="2" transform="rotate(4 40 40)" />
            <rect x="29" y="27" width="23" height="25" rx="2" class="rough" transform="rotate(6 40 40)" />
            <path d="M16 22 l8 8 M17 21 l7 9" class="rough" />
          </svg>
          <span>Eis</span>
        </div>
        <!-- Zitrone Sketchy -->
        <div class="item">
          <svg class="icon" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="26" />
            <circle cx="31" cy="33" r="25" class="rough" />
            <circle cx="33" cy="31" r="27" class="rough" />
            <circle cx="32" cy="32" r="18" />
            <path d="M32 14 v36 M14 32 h36 M19 19 l26 26 M19 45 l26 -26" />
            <path d="M33 13 v38 M13 33 h38" class="rough" />
          </svg>
          <span>Zitrone</span>
        </div>
        <!-- Sekt Sketchy -->
        <div class="item">
          <svg class="icon" viewBox="0 0 64 64">
            <path d="M24 8 h16 v16 l8 32 h-32 l8 -32 z" />
            <path d="M23 7 h18 v17 l7 31 h-30 l7 -31 z" class="rough" />
            <path d="M25 9 h14 v15 l9 33 h-34 l9 -33 z" class="rough" />
            <path d="M26 12 h12 M30 20 h4" />
          </svg>
          <span>Sekt</span>
        </div>
      </div>
    </section>

    <section style="margin-top: 3rem;">
      <h2>So geht's:</h2>
      <div class="flow">
        <div class="step">
          <svg class="icon" viewBox="0 0 64 64">
            <path d="M12 12 c0 0 0 32 20 32 c20 0 20 -32 20 -32 z" />
            <path d="M11 13 c0 0 0 33 21 33 c21 0 21 -33 21 -33 z" class="rough" />
            <path d="M32 44 v16 M20 60 h24" />
          </svg>
          <strong>Glas</strong><em>kühlen</em>
        </div>
        <div class="arrow">~></div>
        <div class="step">
          <svg class="icon" viewBox="0 0 64 64">
            <rect x="20" y="20" width="24" height="24" rx="2" />
            <rect x="19" y="19" width="26" height="26" rx="2" class="rough" />
          </svg>
          <strong>2–3 Eis</strong>
        </div>
        <div class="arrow">~></div>
        <div class="step">
          <svg class="icon" viewBox="0 0 64 64">
            <path d="M12 12 c0 0 0 32 20 32 c20 0 20 -32 20 -32 z" />
            <path d="M11 13 c0 0 0 33 21 33 c21 0 21 -33 21 -33 z" class="rough" />
            <path d="M14 26 h36" />
            <path d="M13 27 h38" class="rough" />
            <path d="M32 44 v16 M20 60 h24" />
          </svg>
          <strong>4cl Ingwer</strong><em>+ 3cl Zitrone</em>
        </div>
        <div class="arrow">~></div>
        <div class="step">
          <svg class="icon" viewBox="0 0 64 64">
            <path d="M24 8 h16 v16 l8 32 h-32 l8 -32 z" />
            <path d="M23 7 h18 v17 l7 31 h-30 l7 -31 z" class="rough" />
          </svg>
          <strong>Sekt</strong><em>auffüllen</em>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
